name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into config
        run: |
          sed -i "s|%%APPS_SCRIPT_URL%%|${{ secrets.APPS_SCRIPT_URL }}|g" js/config.js
          sed -i "s|%%WEB_SECRET%%|${{ secrets.WEB_SECRET }}|g" js/config.js
          sed -i "s|%%ADMIN_CODE%%|${{ secrets.ADMIN_CODE }}|g" js/config.js
          sed -i "s|%%IMGBB_KEY%%|${{ secrets.IMGBB_KEY }}|g" js/config.js
          sed -i "s|%%PROXY_URL%%|${{ secrets.PROXY_URL }}|g" js/config.js
          sed -i "s|%%SPECTATOR_CODE%%|${{ secrets.SPECTATOR_CODE }}|g" js/config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,*.txt,*.md,node_modules'
