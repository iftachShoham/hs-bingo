<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High Society — Snakes &amp; Rats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/webp" href="images/HS logo small.webp" />
  <link rel="manifest" href="/hs-bingo/manifest.json" />
  <meta name="theme-color" content="#c8a84b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="HS Bingo" />
  <link rel="apple-touch-icon" href="/hs-bingo/icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Login Screen ── -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">🐀</div>
      <h1>High Society</h1>
      <p class="login-sub">Snakes &amp; Rats — Team Portal</p>
      <input id="team-code-input" type="text" placeholder="Paste your Discord channel ID" autocomplete="off" spellcheck="false" />
      <input id="player-name-input" type="text" placeholder="Your name (optional)" autocomplete="off" spellcheck="false" style="margin-top:8px;" />
      <button id="login-btn">Enter Game</button>
      <p id="login-error" class="error-msg hidden"></p>
    </div>
  </div>

  <!-- ── Game Screen ── -->
  <div id="game-screen" class="hidden">

    <header id="game-header">
      <span id="header-title">🐀 High Society — Snakes &amp; Rats</span>
      <div id="header-right">
        <span id="header-team-badge" class="badge"></span>
        <span id="header-tile-badge" class="badge badge-tile"></span>
        <span id="poll-dot" title="Live updates active">●</span>
        <button class="btn-ghost" id="logout-btn">Logout</button>
      </div>
    </header>

    <div id="main-layout">

      <!-- ── Board ── -->
      <div id="board-wrapper">
        <div id="board-gif-overlay" class="hidden">
          <img id="board-gif-img" src="" alt="" />
        </div>
        <div id="board-grid"></div>
        <div id="board-legend">
          <div class="leg-row"><span class="leg-swatch snake-swatch"></span>Snake head</div>
          <div class="leg-row"><span class="leg-swatch rat-swatch"></span>Revealed rat</div>
          <div class="leg-row"><span class="leg-swatch my-swatch"></span>Your tile</div>
          <div class="leg-row"><span class="leg-swatch done-swatch"></span>You completed</div>
        </div>
      </div>

      <!-- ── Side Panel ── -->
      <aside id="side-panel">

        <section class="panel-section" id="task-section">
          <h3>📍 Current Task</h3>
          <div id="task-box">
            <div id="task-tile">—</div>
            <div id="task-desc">—</div>
            <div id="task-status">—</div>
          </div>
        </section>

        <section class="panel-section" id="roll-section">
          <h3>🎲 Roll Dice</h3>
          <button class="btn-action btn-roll" id="btn-roll" onclick="doRoll()">🎲 Roll Dice</button>
          <div id="roll-result" class="action-result hidden"></div>
        </section>

        <section class="panel-section" id="complete-section">
          <h3>✅ Complete Task</h3>

          <!-- Proof zone: drag-drop / paste / camera / URL -->
          <div id="proof-zone" class="proof-zone">
            <div id="proof-preview" class="proof-preview hidden">
              <label for="proof-file" class="proof-img-label">
                <img id="proof-img" alt="proof preview" />
                <span class="proof-replace-hint">📷 Replace</span>
              </label>
              <button class="proof-clear-btn" onclick="clearProof()">✕</button>
            </div>
            <div id="proof-inputs">
              <label for="proof-file" class="proof-file-label">
                <span id="proof-file-icon">📷</span> Photo / File
                <input id="proof-file" type="file" accept="image/*" />
              </label>
              <input id="proof-url" type="text" placeholder="or paste a URL…" autocomplete="off" />
              <p class="proof-hint">Drag &amp; drop or paste an image here</p>
            </div>
          </div>

          <button class="btn-action btn-complete" id="btn-complete" onclick="doComplete()">✅ Complete Task</button>
          <div id="complete-result" class="action-result hidden"></div>
        </section>

        <section class="panel-section" id="teams-section">
          <h3>🏆 All Teams</h3>
          <div id="teams-list"></div>
        </section>

        <section class="panel-section hidden" id="admin-section">
          <h3>🛡️ Game Master</h3>
          <div id="admin-controls">
            <label class="admin-label">Target team</label>
            <select id="admin-target" class="admin-select">
              <option value="">Select team…</option>
            </select>
            <button class="btn-action btn-admin" onclick="doPunish()">⏪ Punish (roll back)</button>
            <div class="admin-move-row">
              <input id="admin-tile" type="number" min="1" max="100" placeholder="Tile 1-100" class="admin-tile-input" />
              <button class="btn-action btn-admin" onclick="doMove()">➡️ Move to tile</button>
            </div>
            <button class="btn-action btn-reset" onclick="doReset()">🔄 Reset Entire Game</button>
          </div>
        </section>

      </aside>
    </div>

    <!-- ── Event Feed ── -->
    <div id="event-feed">
      <div id="feed-header">
        <span>📋 Events</span>
        <button class="btn-ghost" onclick="clearFeed()">Clear</button>
      </div>
      <div id="feed-items"></div>
    </div>

    <!-- ── Mobile Tab Bar ── -->
    <nav id="mobile-tabs">
      <button class="tab-btn active" data-tab="board" onclick="switchTab('board')">
        <span class="tab-icon">🗺️</span><span class="tab-label">Board</span>
      </button>
      <button class="tab-btn" data-tab="play" onclick="switchTab('play')">
        <span class="tab-icon">🎲</span><span class="tab-label">Play</span>
      </button>
      <button class="tab-btn" data-tab="teams" onclick="switchTab('teams')">
        <span class="tab-icon">🏆</span><span class="tab-label">Teams</span>
      </button>
      <button class="tab-btn" data-tab="log" onclick="switchTab('log')">
        <span class="tab-icon">📋</span><span class="tab-label">Log</span>
      </button>
    </nav>

  </div>

  <!-- ── Tile Info Modal (mobile tap) ── -->
  <div id="tile-modal" class="hidden" onclick="closeTileModal()">
    <div id="tile-modal-card" onclick="event.stopPropagation()">
      <button class="tile-modal-close" onclick="closeTileModal()">✕</button>
      <div id="tile-modal-num"></div>
      <div id="tile-modal-task"></div>
      <div id="tile-modal-img" class="hidden"></div>
      <div id="tile-modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
